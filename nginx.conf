server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # add_header no se hereda en un location que ya trae los suyos propios
    # (los de /assets/ de aquí abajo pisarían estos si no se repiten) — por
    # eso están duplicados en las dos location en vez de puestos solo aquí.
    location / {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'none'" always;
    }
}
